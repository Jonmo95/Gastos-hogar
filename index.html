<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏡 GastosHogar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0F1A;
    min-height: 100vh;
    font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    color: #F1F5F9;
    padding-bottom: 80px;
  }
  header {
    background: #0D1424;
    border-bottom: 1px solid #1E293B;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 680px; margin: 0 auto; padding: 0 16px;
    display: flex; justify-content: space-between; align-items: center; height: 52px;
  }
  .logo { color: #F1F5F9; font-weight: 800; font-size: 15px; letter-spacing: -0.3px; }
  nav { display: flex; gap: 2px; }
  .nav-btn {
    background: none; border: none; color: #475569; cursor: pointer;
    padding: 6px 10px; border-radius: 8px; display: flex; flex-direction: column;
    align-items: center; gap: 2px; transition: all 0.15s; font-family: inherit;
  }
  .nav-btn .nav-icon { font-size: 14px; }
  .nav-btn .nav-label { font-size: 10px; }
  .nav-btn.active { background: #1E293B; color: #F1F5F9; }
  main { max-width: 680px; margin: 0 auto; padding: 20px 16px; }
  .view { display: none; }
  .view.active { display: block; }
  h2.page-title { font-size: 20px; font-weight: 800; color: #F1F5F9; margin-bottom: 16px; letter-spacing: -0.5px; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .card {
    background: #0D1424; border: 1px solid #1E293B; border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
  }
  .kpi-card { padding: 14px 16px; border-left: 3px solid; }
  .kpi-label { font-size: 11px; color: #64748B; margin-bottom: 4px; }
  .kpi-value { font-size: 22px; font-weight: 800; line-height: 1; }
  .kpi-sub { font-size: 10px; color: #475569; margin-top: 4px; }
  .card-title { color: #94A3B8; font-size: 12px; font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .bar-bg { background: #1E293B; border-radius: 99px; height: 6px; overflow: hidden; margin-top: 3px; }
  .bar-fill { height: 6px; border-radius: 99px; transition: width 0.5s ease; }
  .expense-row {
    display: flex; gap: 10px; align-items: center; padding: 10px 0;
    border-bottom: 1px solid #0F172A;
  }
  .expense-row:last-child { border-bottom: none; }
  .expense-icon { font-size: 20px; flex-shrink: 0; }
  .expense-info { flex: 1; min-width: 0; }
  .expense-name { color: #F1F5F9; font-size: 13px; font-weight: 500; }
  .expense-note { color: #64748B; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .expense-date { color: #475569; font-size: 11px; }
  .expense-amount { font-weight: 700; font-size: 14px; flex-shrink: 0; }
  label.field-label { display: block; color: #64748B; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
  input[type=text], input[type=number], input[type=date], select, textarea {
    background: #0F172A; border: 1px solid #1E293B; border-radius: 8px; color: #F1F5F9;
    padding: 10px 12px; font-size: 14px; width: 100%; outline: none;
    font-family: inherit; transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: #3B82F6; }
  .field { margin-bottom: 14px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 6px; }
  .cat-btn {
    border-radius: 10px; padding: 10px 6px; display: flex; flex-direction: column;
    align-items: center; cursor: pointer; transition: all 0.15s; background: #0F172A;
    border: 2px solid #1E293B; gap: 4px;
  }
  .cat-btn .cat-icon { font-size: 18px; }
  .cat-btn .cat-name { font-size: 10px; color: #CBD5E1; line-height: 1.2; text-align: center; }
  .cat-btn.selected { }
  .btn-primary {
    background: #3B82F6; border: none; border-radius: 8px; color: #fff;
    padding: 10px 20px; font-weight: 700; font-size: 14px; cursor: pointer;
    font-family: inherit; width: 100%; transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary {
    background: #1E293B; border: 1px solid #334155; border-radius: 8px; color: #CBD5E1;
    padding: 10px 16px; font-weight: 600; font-size: 13px; cursor: pointer;
    font-family: inherit; transition: opacity 0.15s;
  }
  .btn-danger {
    background: #EF4444; border: none; border-radius: 8px; color: #fff;
    padding: 10px 20px; font-weight: 700; font-size: 14px; cursor: pointer;
    font-family: inherit;
  }
  .btn-small-delete {
    background: none; border: none; color: #EF4444; cursor: pointer;
    font-size: 14px; padding: 2px 6px; opacity: 0.6; font-family: inherit;
  }
  .btn-small-delete:hover { opacity: 1; }
  .tab-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn {
    background: #0F172A; border: 1px solid #1E293B; border-radius: 8px; color: #64748B;
    padding: 8px 12px; font-size: 12px; cursor: pointer; font-weight: 500; font-family: inherit;
  }
  .tab-btn.active { background: #1E293B; color: #F1F5F9; border-color: #334155; }
  .analytics-sub { display: none; }
  .analytics-sub.active { display: block; }
  #toast {
    position: fixed; top: 16px; right: 16px; z-index: 999;
    padding: 10px 18px; border-radius: 10px; color: #fff; font-weight: 600; font-size: 13px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); display: none; transition: opacity 0.3s;
  }
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200;
    display: none; align-items: center; justify-content: center;
  }
  .overlay.active { display: flex; }
  .modal {
    background: #0D1424; border: 1px solid #1E293B; border-radius: 14px;
    padding: 24px; min-width: 260px;
  }
  .modal p { color: #F1F5F9; margin-bottom: 16px; font-size: 15px; }
  .modal-btns { display: flex; gap: 10px; }
  .history-header {
    padding: 12px 16px; border-bottom: 1px solid #1E293B;
    display: flex; justify-content: space-between; align-items: center;
  }
  .history-list { }
  .history-row {
    display: flex; gap: 10px; align-items: center;
    padding: 12px 16px; border-bottom: 1px solid #0F172A;
  }
  .history-row:last-child { border-bottom: none; }
  .flex-row { display: flex; gap: 10px; align-items: center; }
  .flex-row-sb { display: flex; justify-content: space-between; align-items: center; }
  .stat-row {
    display: flex; justify-content: space-between; padding: 6px 0;
    border-bottom: 1px solid #1E293B;
  }
  .stat-row:last-child { border-bottom: none; }
  .cats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .cat-tag {
    display: flex; gap: 8px; align-items: center; padding: 6px 10px;
    background: #0F172A; border-radius: 8px; border: 1px solid;
  }
  .empty-msg { color: #475569; text-align: center; padding: 32px 0; }
  .compare-totals {
    margin-top: 12px; padding-top: 12px; border-top: 1px solid #1E293B;
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .diff-center { text-align: center; margin-top: 8px; font-weight: 700; }
  .year-compare-bar { display: flex; flex-direction: column; gap: 3px; }
  .year-bar-row { display: flex; gap: 6px; align-items: center; }
  .year-bar-label { font-size: 10px; width: 28px; }
  .year-bar-val { font-size: 10px; width: 60px; text-align: right; color: #CBD5E1; }
  .annual-total { margin-top: 12px; padding-top: 12px; border-top: 1px solid #1E293B; }
  @media (max-width: 480px) {
    .header-inner { padding: 0 8px; }
    .nav-btn { padding: 6px 7px; }
    .nav-btn .nav-label { display: none; }
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    main { padding: 14px 10px; }
  }
</style>
</head>
<body>

<div id="toast"></div>

<div class="overlay" id="delete-overlay">
  <div class="modal">
    <p>¿Eliminar este gasto?</p>
    <div class="modal-btns">
      <button class="btn-danger" onclick="confirmDelete()">Eliminar</button>
      <button class="btn-secondary" onclick="closeDeleteModal()">Cancelar</button>
    </div>
  </div>
</div>

<header>
  <div class="header-inner">
    <span class="logo">🏡 GastosHogar</span>
    <nav>
      <button class="nav-btn active" data-view="dashboard" onclick="setView('dashboard')">
        <span class="nav-icon">📊</span><span class="nav-label">Inicio</span>
      </button>
      <button class="nav-btn" data-view="add" onclick="setView('add')">
        <span class="nav-icon">➕</span><span class="nav-label">Añadir</span>
      </button>
      <button class="nav-btn" data-view="history" onclick="setView('history')">
        <span class="nav-icon">📋</span><span class="nav-label">Histórico</span>
      </button>
      <button class="nav-btn" data-view="analytics" onclick="setView('analytics')">
        <span class="nav-icon">📈</span><span class="nav-label">Análisis</span>
      </button>
      <button class="nav-btn" data-view="settings" onclick="setView('settings')">
        <span class="nav-icon">⚙️</span><span class="nav-label">Ajustes</span>
      </button>
    </nav>
  </div>
</header>

<main>

  <!-- ── DASHBOARD ── -->
  <div id="view-dashboard" class="view active">
    <h2 class="page-title" id="dash-title"></h2>
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="card" id="budget-bar-card"></div>
    <div class="card">
      <div class="card-title" id="dash-cat-title"></div>
      <div id="dash-cats"></div>
    </div>
    <div class="card">
      <div class="card-title">Últimos movimientos</div>
      <div id="dash-recent"></div>
    </div>
  </div>

  <!-- ── ADD ── -->
  <div id="view-add" class="view">
    <h2 class="page-title">Registrar Gasto</h2>
    <div class="card">
      <div class="field">
        <label class="field-label">Categoría *</label>
        <div class="cat-grid" id="add-cat-grid"></div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label class="field-label">Importe (€) *</label>
          <input type="number" id="add-amount" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="field">
          <label class="field-label">Fecha *</label>
          <input type="date" id="add-date">
        </div>
      </div>
      <div class="field">
        <label class="field-label">Nota (opcional)</label>
        <input type="text" id="add-note" placeholder="Ej: Factura bimestral agosto...">
      </div>
      <div class="field">
        <label class="field-label">Periodicidad</label>
        <select id="add-recurring">
          <option value="once">Puntual</option>
          <option value="monthly">Mensual</option>
          <option value="bimonthly">Bimestral</option>
          <option value="quarterly">Trimestral</option>
          <option value="biannual">Semestral</option>
          <option value="annual">Anual</option>
        </select>
      </div>
      <button class="btn-primary" onclick="addExpense()">Registrar Gasto</button>
    </div>
  </div>

  <!-- ── HISTORY ── -->
  <div id="view-history" class="view">
    <h2 class="page-title">Histórico de Gastos</h2>
    <div class="card" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:14px;">
      <div>
        <label class="field-label">Año</label>
        <select id="hist-year" onchange="renderHistory()">
          <option value="-1">Todos</option>
        </select>
      </div>
      <div>
        <label class="field-label">Mes</label>
        <select id="hist-month" onchange="renderHistory()">
          <option value="-1">Todos</option>
        </select>
      </div>
      <div>
        <label class="field-label">Categoría</label>
        <select id="hist-cat" onchange="renderHistory()">
          <option value="">Todas</option>
        </select>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <div class="history-header">
        <span id="hist-count" style="color:#94A3B8;font-size:12px;"></span>
        <span id="hist-total" style="color:#F59E0B;font-weight:700;"></span>
      </div>
      <div id="hist-list" class="history-list"></div>
    </div>
  </div>

  <!-- ── ANALYTICS ── -->
  <div id="view-analytics" class="view">
    <h2 class="page-title">Análisis y Comparativas</h2>
    <div class="tab-row">
      <button class="tab-btn active" data-atab="months" onclick="setAnalyticsTab('months')">Meses del año</button>
      <button class="tab-btn" data-atab="years" onclick="setAnalyticsTab('years')">Entre años</button>
      <button class="tab-btn" data-atab="catYear" onclick="setAnalyticsTab('catYear')">Por categoría/año</button>
    </div>

    <!-- Months tab -->
    <div id="atab-months" class="analytics-sub active">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;">
        <select id="anal-year" onchange="renderAnalMonths()" style="width:auto;"></select>
      </div>
      <div class="card" id="anal-months-content"></div>
    </div>

    <!-- Years tab -->
    <div id="atab-years" class="analytics-sub">
      <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
        <select id="anal-year1" onchange="renderAnalYears()" style="width:auto;"></select>
        <span style="color:#475569;">vs</span>
        <select id="anal-year2" onchange="renderAnalYears()" style="width:auto;"></select>
      </div>
      <div class="card" id="anal-years-content"></div>
    </div>

    <!-- CatYear tab -->
    <div id="atab-catYear" class="analytics-sub">
      <div style="display:flex;gap:10px;margin-bottom:12px;">
        <select id="anal-cat-year" onchange="renderAnalCatYear()" style="width:auto;"></select>
      </div>
      <div class="card" id="anal-cat-content"></div>
      <div class="card" id="anal-samemonth-content"></div>
    </div>
  </div>

  <!-- ── SETTINGS ── -->
  <div id="view-settings" class="view">
    <h2 class="page-title">Ajustes</h2>
    <div class="card">
      <div class="card-title">Presupuesto mensual</div>
      <div class="flex-row">
        <input type="number" id="budget-input" placeholder="900" style="flex:1;">
        <button class="btn-primary" style="width:auto;padding:10px 16px;" onclick="saveBudget()">Guardar</button>
      </div>
      <p id="budget-current" style="color:#475569;font-size:11px;margin-top:6px;"></p>
    </div>
    <div class="card">
      <div class="card-title">Añadir categoría</div>
      <div class="flex-row">
        <input type="text" id="new-cat-icon" placeholder="🏷️" maxlength="2" style="width:60px;">
        <input type="text" id="new-cat-name" placeholder="Nombre de categoría" style="flex:1;">
        <button class="btn-primary" style="width:auto;padding:10px 16px;" onclick="addCategory()">+</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title" id="settings-cat-title"></div>
      <div class="cats-grid" id="settings-cats"></div>
    </div>
    <div class="card">
      <div class="card-title">Estadísticas generales</div>
      <div id="settings-stats"></div>
    </div>
    <div class="card">
      <div class="card-title">Datos</div>
      <div class="flex-row">
        <button class="btn-secondary" onclick="exportData()">📥 Exportar JSON</button>
        <label class="btn-secondary" style="cursor:pointer;">
          📤 Importar JSON
          <input type="file" accept=".json" style="display:none;" onchange="importData(event)">
        </label>
      </div>
    </div>
  </div>

</main>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = "gastos_hogar_v1";
const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MONTH_NAMES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const YEARS_RANGE = [2019,2020,2021,2022,2023,2024,2025,2026];

const DEFAULT_CATEGORIES = [
  { id:"luz",         name:"Luz",          icon:"⚡", color:"#F59E0B" },
  { id:"agua",        name:"Agua",         icon:"💧", color:"#3B82F6" },
  { id:"gas",         name:"Gas",          icon:"🔥", color:"#EF4444" },
  { id:"telefono",    name:"Teléfono",     icon:"📱", color:"#8B5CF6" },
  { id:"comunidad",   name:"Comunidad",    icon:"🏘️", color:"#10B981" },
  { id:"gimnasio",    name:"Gimnasio",     icon:"🏋️", color:"#F97316" },
  { id:"seguro_casa", name:"Seguro Casa",  icon:"🏠", color:"#06B6D4" },
  { id:"seguro_coche",name:"Seguro Coche", icon:"🚗", color:"#84CC16" },
  { id:"combustible", name:"Combustible",  icon:"⛽", color:"#64748B" },
  { id:"pena",        name:"Peña",         icon:"🎭", color:"#EC4899" },
  { id:"comida",      name:"Comida",       icon:"🛒", color:"#14B8A6" },
  { id:"otros",       name:"Otros Gastos", icon:"📦", color:"#94A3B8" },
];

let appData = loadData();
let selectedCatId = "";
let pendingDeleteId = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { expenses: [], categories: JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)), monthlyBudget: 900 };
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch {}
}

function formatEur(val) {
  return new Intl.NumberFormat("es-ES", { style:"currency", currency:"EUR" }).format(val || 0);
}

function getCat(id) {
  return appData.categories.find(c => c.id === id) || { name: id, icon:"❓", color:"#888" };
}

function expensesFor(year, month) {
  return appData.expenses.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === year && (month === -1 || d.getMonth() === month);
  });
}

function totalFor(year, month) {
  return expensesFor(year, month).reduce((s, e) => s + e.amount, 0);
}

function catTotalFor(catId, year, month) {
  return expensesFor(year, month).filter(e => e.categoryId === catId).reduce((s, e) => s + e.amount, 0);
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = "ok") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = type === "err" ? "#EF4444" : "#10B981";
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, 2500);
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function setView(v) {
  document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(el => el.classList.remove("active"));
  document.getElementById("view-" + v).classList.add("active");
  document.querySelector(`.nav-btn[data-view="${v}"]`).classList.add("active");
  if (v === "dashboard") renderDashboard();
  if (v === "add") renderAddView();
  if (v === "history") renderHistory();
  if (v === "analytics") renderAnalytics();
  if (v === "settings") renderSettings();
}

// ─── DELETE MODAL ─────────────────────────────────────────────────────────────
function openDeleteModal(id) {
  pendingDeleteId = id;
  document.getElementById("delete-overlay").classList.add("active");
}
function closeDeleteModal() {
  pendingDeleteId = null;
  document.getElementById("delete-overlay").classList.remove("active");
}
function confirmDelete() {
  if (!pendingDeleteId) return;
  appData.expenses = appData.expenses.filter(e => e.id !== pendingDeleteId);
  saveData();
  closeDeleteModal();
  showToast("Gasto eliminado");
  renderHistory();
  renderDashboard();
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const now = new Date();
  const thisYear = now.getFullYear(), thisMonth = now.getMonth();
  const monthTotal = totalFor(thisYear, thisMonth);
  const yearTotal  = totalFor(thisYear, -1);
  const budget     = appData.monthlyBudget;
  const remaining  = budget - monthTotal;

  document.getElementById("dash-title").textContent = MONTH_NAMES[thisMonth] + " " + thisYear;

  // KPI
  const kpiData = [
    { label:"Gastado este mes", value:formatEur(monthTotal), sub:`de ${formatEur(budget)} presupuesto`, accent:"#F59E0B" },
    { label:"Disponible",       value:formatEur(remaining),  sub:"resto del mes",                        accent: remaining >= 0 ? "#10B981" : "#EF4444" },
    { label:"Total año",        value:formatEur(yearTotal),  sub:String(thisYear),                       accent:"#8B5CF6" },
    { label:"Gastos este mes",  value:expensesFor(thisYear,thisMonth).length, sub:"registros",           accent:"#3B82F6" },
  ];
  document.getElementById("kpi-grid").innerHTML = kpiData.map(k => `
    <div class="card kpi-card" style="border-left-color:${k.accent};">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value" style="color:${k.accent};">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join("");

  // Budget bar
  const pct = Math.min((monthTotal / budget) * 100, 100);
  const barColor = monthTotal > budget ? "#EF4444" : "#10B981";
  document.getElementById("budget-bar-card").innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
      <span style="color:#64748B;font-size:12px;">Presupuesto mensual</span>
      <span style="color:#94A3B8;font-size:12px;">${Math.round((monthTotal/budget)*100)}%</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${barColor};"></div></div>`;

  // Category breakdown
  document.getElementById("dash-cat-title").textContent = `Desglose por categoría · ${MONTH_NAMES[thisMonth]}`;
  const cats = appData.categories.map(cat => ({ cat, total: catTotalFor(cat.id, thisYear, thisMonth) }))
    .filter(x => x.total > 0).sort((a,b) => b.total - a.total);
  if (cats.length === 0) {
    document.getElementById("dash-cats").innerHTML = `<p class="empty-msg">Sin gastos este mes aún</p>`;
  } else {
    document.getElementById("dash-cats").innerHTML = cats.map(({cat, total}) => {
      const pct = monthTotal > 0 ? (total/monthTotal)*100 : 0;
      return `<div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <span style="color:#CBD5E1;font-size:13px;">${cat.icon} ${cat.name}</span>
          <span style="color:#F1F5F9;font-size:13px;font-weight:600;">${formatEur(total)}</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${cat.color};opacity:0.85;"></div></div>
      </div>`;
    }).join("");
  }

  // Recent
  const recent = [...appData.expenses].sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0,8);
  if (recent.length === 0) {
    document.getElementById("dash-recent").innerHTML = `<p class="empty-msg">Sin gastos registrados</p>`;
  } else {
    document.getElementById("dash-recent").innerHTML = recent.map(e => {
      const cat = getCat(e.categoryId);
      return `<div class="expense-row">
        <span class="expense-icon">${cat.icon}</span>
        <div class="expense-info">
          <div class="expense-name">${cat.name}</div>
          ${e.note ? `<div class="expense-note">${e.note}</div>` : ""}
          <div class="expense-date">${e.date}</div>
        </div>
        <span class="expense-amount" style="color:${cat.color};">${formatEur(e.amount)}</span>
      </div>`;
    }).join("");
  }
}

// ─── ADD VIEW ─────────────────────────────────────────────────────────────────
function renderAddView() {
  selectedCatId = "";
  const grid = document.getElementById("add-cat-grid");
  grid.innerHTML = appData.categories.map(cat => `
    <button class="cat-btn" id="catbtn-${cat.id}" onclick="selectCat('${cat.id}')">
      <span class="cat-icon">${cat.icon}</span>
      <span class="cat-name">${cat.name}</span>
    </button>`).join("");
  // reset form
  document.getElementById("add-amount").value = "";
  document.getElementById("add-date").value = new Date().toISOString().slice(0,10);
  document.getElementById("add-note").value = "";
  document.getElementById("add-recurring").value = "once";
}

function selectCat(id) {
  selectedCatId = id;
  document.querySelectorAll(".cat-btn").forEach(btn => {
    btn.style.border = "2px solid #1E293B";
    btn.style.background = "#0F172A";
  });
  const cat = getCat(id);
  const btn = document.getElementById("catbtn-" + id);
  if (btn) {
    btn.style.border = `2px solid ${cat.color}`;
    btn.style.background = cat.color + "22";
  }
}

function addExpense() {
  const amount = parseFloat(document.getElementById("add-amount").value);
  const date   = document.getElementById("add-date").value;
  if (!selectedCatId) { showToast("Selecciona una categoría", "err"); return; }
  if (!amount || isNaN(amount) || amount <= 0) { showToast("Introduce un importe válido", "err"); return; }
  if (!date) { showToast("Selecciona una fecha", "err"); return; }
  const expense = {
    id: Date.now() + Math.random(),
    categoryId: selectedCatId,
    amount,
    note: document.getElementById("add-note").value.trim(),
    date,
    recurring: document.getElementById("add-recurring").value,
  };
  appData.expenses.push(expense);
  saveData();
  renderAddView();
  showToast("Gasto añadido ✓");
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function initHistoryFilters() {
  const yearSel = document.getElementById("hist-year");
  if (yearSel.options.length <= 1) {
    YEARS_RANGE.forEach(y => {
      const o = document.createElement("option"); o.value = y; o.textContent = y; yearSel.appendChild(o);
    });
    yearSel.value = new Date().getFullYear();
  }
  const monthSel = document.getElementById("hist-month");
  if (monthSel.options.length <= 1) {
    MONTHS.forEach((m, i) => {
      const o = document.createElement("option"); o.value = i; o.textContent = m; monthSel.appendChild(o);
    });
  }
  const catSel = document.getElementById("hist-cat");
  catSel.innerHTML = '<option value="">Todas</option>';
  appData.categories.forEach(c => {
    const o = document.createElement("option"); o.value = c.id; o.textContent = c.icon + " " + c.name;
    catSel.appendChild(o);
  });
}

function renderHistory() {
  initHistoryFilters();
  const year = parseInt(document.getElementById("hist-year").value);
  const month = parseInt(document.getElementById("hist-month").value);
  const catId = document.getElementById("hist-cat").value;

  const filtered = appData.expenses.filter(e => {
    const d = new Date(e.date);
    return (year === -1 || d.getFullYear() === year)
      && (month === -1 || d.getMonth() === month)
      && (!catId || e.categoryId === catId);
  }).sort((a,b) => new Date(b.date) - new Date(a.date));

  const total = filtered.reduce((s,e) => s + e.amount, 0);
  document.getElementById("hist-count").textContent = filtered.length + " registros";
  document.getElementById("hist-total").textContent = formatEur(total);

  if (filtered.length === 0) {
    document.getElementById("hist-list").innerHTML = `<p class="empty-msg">Sin resultados</p>`;
    return;
  }
  document.getElementById("hist-list").innerHTML = filtered.map(e => {
    const cat = getCat(e.categoryId);
    const recLabel = { once:"puntual", monthly:"mensual", bimonthly:"bimestral", quarterly:"trimestral", biannual:"semestral", annual:"anual" }[e.recurring] || e.recurring;
    return `<div class="history-row">
      <span style="font-size:20px;">${cat.icon}</span>
      <div style="flex:1;min-width:0;">
        <div style="color:#F1F5F9;font-size:13px;font-weight:500;">${cat.name}</div>
        ${e.note ? `<div style="color:#64748B;font-size:11px;">${e.note}</div>` : ""}
        <div style="color:#475569;font-size:11px;">${e.date} · ${recLabel}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="color:${cat.color};font-weight:700;font-size:14px;">${formatEur(e.amount)}</span>
        <button class="btn-small-delete" onclick="openDeleteModal(${JSON.stringify(e.id)})">✕</button>
      </div>
    </div>`;
  }).join("");
}

// ─── ANALYTICS ────────────────────────────────────────────────────────────────
function initAnalSelects() {
  ["anal-year","anal-year1","anal-year2","anal-cat-year"].forEach(id => {
    const sel = document.getElementById(id);
    if (sel.options.length === 0) {
      YEARS_RANGE.forEach(y => { const o = document.createElement("option"); o.value = y; o.textContent = y; sel.appendChild(o); });
    }
  });
  document.getElementById("anal-year").value    = new Date().getFullYear();
  document.getElementById("anal-year1").value   = new Date().getFullYear();
  document.getElementById("anal-year2").value   = new Date().getFullYear() - 1;
  document.getElementById("anal-cat-year").value = new Date().getFullYear();
}

function setAnalyticsTab(tab) {
  document.querySelectorAll(".tab-btn[data-atab]").forEach(b => b.classList.remove("active"));
  document.querySelector(`.tab-btn[data-atab="${tab}"]`).classList.add("active");
  document.querySelectorAll(".analytics-sub").forEach(el => el.classList.remove("active"));
  document.getElementById("atab-" + tab).classList.add("active");
  if (tab === "months") renderAnalMonths();
  if (tab === "years") renderAnalYears();
  if (tab === "catYear") renderAnalCatYear();
}

function renderAnalytics() {
  initAnalSelects();
  renderAnalMonths();
}

function renderAnalMonths() {
  const year = parseInt(document.getElementById("anal-year").value);
  const values = MONTHS.map((_,i) => totalFor(year, i));
  const maxVal = Math.max(...values, 1);
  const budget = appData.monthlyBudget;
  const yearTotal = totalFor(year, -1);

  document.getElementById("anal-months-content").innerHTML = `
    <div class="card-title">Gasto mensual ${year}</div>
    ${MONTHS.map((m,i) => {
      const tot = values[i];
      const pct = (tot/maxVal)*100;
      const color = tot > budget ? "#EF4444" : "#3B82F6";
      return `<div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
          <span style="color:#94A3B8;font-size:12px;width:30px;">${m}</span>
          <span style="color:${tot > budget ? "#EF4444":"#CBD5E1"};font-size:12px;font-weight:600;">${formatEur(tot)}</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>
      </div>`;
    }).join("")}
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid #1E293B;display:flex;justify-content:space-between;">
      <span style="color:#94A3B8;font-size:12px;">Total anual</span>
      <span style="color:#F59E0B;font-weight:700;">${formatEur(yearTotal)}</span>
    </div>`;
}

function renderAnalYears() {
  const y1 = parseInt(document.getElementById("anal-year1").value);
  const y2 = parseInt(document.getElementById("anal-year2").value);

  const rows = MONTHS.map((m,i) => {
    const t1 = totalFor(y1, i), t2 = totalFor(y2, i);
    const maxVal = Math.max(t1, t2, 1);
    const diff = t1 - t2;
    const diffColor = diff > 0 ? "#EF4444" : diff < 0 ? "#10B981" : "#475569";
    return `<div style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
        <span style="color:#94A3B8;font-size:12px;">${m}</span>
        <span style="color:${diffColor};font-size:11px;font-weight:600;">${diff > 0 ? "+" : ""}${formatEur(diff)}</span>
      </div>
      <div class="year-compare-bar">
        <div class="year-bar-row">
          <span class="year-bar-label" style="color:#8B5CF6;">${y1}</span>
          <div style="flex:1;" class="bar-bg" style="height:8px;"><div class="bar-fill" style="width:${(t1/maxVal)*100}%;background:#8B5CF6;height:8px;"></div></div>
          <span class="year-bar-val">${formatEur(t1)}</span>
        </div>
        <div class="year-bar-row">
          <span class="year-bar-label" style="color:#F59E0B;">${y2}</span>
          <div style="flex:1;" class="bar-bg" style="height:8px;"><div class="bar-fill" style="width:${(t2/maxVal)*100}%;background:#F59E0B;height:8px;"></div></div>
          <span class="year-bar-val">${formatEur(t2)}</span>
        </div>
      </div>
    </div>`;
  }).join("");

  const tot1 = totalFor(y1,-1), tot2 = totalFor(y2,-1);
  const annDiff = tot1 - tot2;
  document.getElementById("anal-years-content").innerHTML = `
    <div class="card-title">${y1} vs ${y2} — por mes</div>
    ${rows}
    <div class="compare-totals">
      <span style="color:#8B5CF6;font-weight:600;">${y1}: ${formatEur(tot1)}</span>
      <span style="color:#F59E0B;font-weight:600;">${y2}: ${formatEur(tot2)}</span>
    </div>
    <div class="diff-center" style="color:${annDiff > 0 ? "#EF4444":"#10B981"};">Diferencia anual: ${formatEur(annDiff)}</div>`;
}

function renderAnalCatYear() {
  const year = parseInt(document.getElementById("anal-cat-year").value);
  const annualTotal = totalFor(year,-1) || 1;
  const cats = appData.categories.map(cat => ({ cat, total: catTotalFor(cat.id,year,-1) }))
    .filter(x => x.total > 0).sort((a,b) => b.total - a.total);

  document.getElementById("anal-cat-content").innerHTML = `
    <div class="card-title">Categorías en ${year}</div>
    ${cats.length === 0 ? `<p class="empty-msg">Sin datos para ${year}</p>` : cats.map(({cat,total}) => {
      const pct = (total/annualTotal)*100;
      return `<div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
          <span style="color:#CBD5E1;font-size:13px;">${cat.icon} ${cat.name}</span>
          <div>
            <span style="color:${cat.color};font-weight:700;font-size:13px;">${formatEur(total)}</span>
            <span style="color:#475569;font-size:10px;margin-left:6px;">${Math.round(pct)}%</span>
          </div>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${cat.color};"></div></div>
      </div>`;
    }).join("")}`;

  // Same month cross-year
  const currentMonth = new Date().getMonth();
  const monthRows = YEARS_RANGE.map(y => {
    const tot = totalFor(y, currentMonth);
    return { y, tot };
  }).filter(x => x.tot > 0);
  const maxV = Math.max(...monthRows.map(x => x.tot), 1);

  document.getElementById("anal-samemonth-content").innerHTML = `
    <div class="card-title">${MONTH_NAMES[currentMonth]} en diferentes años</div>
    ${monthRows.map(({y,tot}) => `
      <div style="margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
          <span style="color:#94A3B8;font-size:12px;">${y}</span>
          <span style="color:#CBD5E1;font-size:12px;font-weight:600;">${formatEur(tot)}</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${(tot/maxV)*100}%;background:#6366F1;"></div></div>
      </div>`).join("")}`;
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function renderSettings() {
  document.getElementById("budget-current").textContent = "Actual: " + formatEur(appData.monthlyBudget) + "/mes";
  document.getElementById("settings-cat-title").textContent = `Categorías (${appData.categories.length})`;
  document.getElementById("settings-cats").innerHTML = appData.categories.map(cat =>
    `<div class="cat-tag" style="border-color:${cat.color}33;">
      <span>${cat.icon}</span>
      <span style="color:#CBD5E1;font-size:12px;flex:1;">${cat.name}</span>
    </div>`).join("");

  const histTotal = appData.expenses.reduce((s,e)=>s+e.amount,0);
  const yearsWithData = [...new Set(appData.expenses.map(e=>new Date(e.date).getFullYear()))].sort().join(", ") || "—";
  document.getElementById("settings-stats").innerHTML = [
    ["Total registros", appData.expenses.length],
    ["Gasto total histórico", formatEur(histTotal)],
    ["Años con datos", yearsWithData],
    ["Categorías", appData.categories.length],
  ].map(([l,v]) => `<div class="stat-row">
    <span style="color:#64748B;font-size:12px;">${l}</span>
    <span style="color:#CBD5E1;font-size:12px;font-weight:600;">${v}</span>
  </div>`).join("");
}

function saveBudget() {
  const val = parseFloat(document.getElementById("budget-input").value);
  if (!val || isNaN(val)) { showToast("Introduce un valor válido", "err"); return; }
  appData.monthlyBudget = val;
  saveData();
  document.getElementById("budget-input").value = "";
  renderSettings();
  showToast("Presupuesto actualizado");
}

function addCategory() {
  const icon = document.getElementById("new-cat-icon").value.trim() || "📌";
  const name = document.getElementById("new-cat-name").value.trim();
  if (!name) { showToast("Escribe un nombre", "err"); return; }
  const colors = ["#A855F7","#22D3EE","#FB7185","#4ADE80","#FACC15","#F97316"];
  const id = name.toLowerCase().replace(/\s+/g,"_") + "_" + Date.now();
  appData.categories.push({ id, name, icon, color: colors[appData.categories.length % colors.length] });
  saveData();
  document.getElementById("new-cat-name").value = "";
  document.getElementById("new-cat-icon").value = "📌";
  renderSettings();
  showToast("Categoría añadida");
}

function exportData() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "gastos_hogar.json";
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (imported.expenses) {
        appData = imported;
        saveData();
        renderSettings();
        showToast("Datos importados correctamente");
      } else { showToast("Formato inválido", "err"); }
    } catch { showToast("Error al importar", "err"); }
  };
  r.readAsText(file);
  event.target.value = "";
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderDashboard();
</script>
</body>
</html>
